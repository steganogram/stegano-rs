name: Release Binary Assets
on:
  release:
    types:
      - published
jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            binName: stegano
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            binName: stegano
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            binName: stegano
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            binName: stegano.exe
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            cross: false
            binName: stegano.exe
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target=${{ matrix.target }}
      - name: Smoke Test
        run: ${{ matrix.cross && 'cross' || 'cargo' }} run --release --target=${{ matrix.target }} -- --help
      - name: Create Archive
        id: archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          filename="stegano-$TAG-$TARGET.tar.gz"
          tar -czvf "$filename" README.md LICENSE -C "target/$TARGET/release" "${{ matrix.binName }}"
          echo "filename=$filename" >> "$GITHUB_OUTPUT"
      - name: Upload Archive
        uses: ncipollo/release-action@v1.8.7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.archive.outputs.filename }}
          artifactContentType: application/octet-stream
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
